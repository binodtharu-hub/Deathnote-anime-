<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Death Note Series</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0f19;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* Header Banner */
    .banner {
      background: url("https://share.google/images/uc1H2w6L8mgNaVM7E") no-repeat center center/cover;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      box-shadow: inset 0 0 0 2000px rgba(0,0,0,0.5);
    }
    .banner h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 10px black;
    }
    .red {
      color: crimson;
    }

    /* Episodes Section */
    .episodes {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #121826;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.6);
      text-align: center;
      transition: transform 0.3s ease;
      opacity: 0;
      transform: scale(0.9);
    }
    .card img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }
    .card h2 {
      margin: 10px 0;
      font-size: 1.2rem;
    }
    .watch-btn {
      display: inline-block;
      margin: 10px 0 20px;
      padding: 10px 20px;
      background: crimson;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: transform 0.2s ease, background 0.3s;
    }
    .watch-btn:hover {
      background: darkred;
      transform: scale(1.05);
    }
    /* Hover effect */
    .card:hover {
      transform: scale(1.05);
    }
  
  </style>
</head>
<body>
  
  <!-- Banner -->
  <div class="banner">
    <h1><span class="red">DEATH NOTE</span> - All Episodes</h1>
  </div>

  <!-- Episodes -->
  <section class="episodes">
    <!-- Episode 1 -->
    <div class="card">
      <img src="death note 2.jpg" alt="Episode 1">
      <h2>Episode 1 - Rebirth</h2>
      <a href="episodes01.html" class="watch-btn">▶ Watch Now</a>
    </div>

    <!-- Episode 2 -->
    <div class="card">
      <img src="death note 2.jpg" alt="Episode 2">
      <h2>Episode 2 - Confrontation</h2>
      <a href="episodes02.html" class="watch-btn">▶ Watch Now</a>
    </div>
  </section>

  <!-- JavaScript (small effect on load) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll('.card');
      cards.forEach((card, index) => {
        setTimeout(() => {
          card.style.opacity = "1";
          card.style.transform = "scale(1)";
        }, index * 200);
      });
    });
  </script>
  <div> <footer><h2>
    <p id="0" style="color: white " align="center">
      
      <b>Thank You ...</b>
      
      
    </h2>
    </p>
    <div>
      
    </div>
  </footer>

        </mark>
      </i>
    </pi></h3>

</body>
</html>
